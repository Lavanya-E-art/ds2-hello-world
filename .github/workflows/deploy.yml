name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ── JOB 1: Build the image and test it ────────────────────────────────────
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ds2-hello-node:ci .

      - name: Start container for testing
        run: docker run -d -p 8080:8080 --name test-container ds2-hello-node:ci

      - name: Wait for app to start
        run: sleep 5

      - name: Test main endpoint
        run: curl -f http://localhost:8080/ || (docker logs test-container && exit 1)

      - name: Test health endpoint
        run: curl -f http://localhost:8080/health || (docker logs test-container && exit 1)

      - name: Stop test container
        if: always()
        run: docker rm -f test-container || true

  # ── JOB 2: Deploy to EC2 via SSH ──────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "~/deploy"

      - name: SSH into EC2 and start container
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/deploy
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f

      - name: Verify the app is live
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sleep 5
            curl -f http://localhost:8080/ || exit 1
            curl -f http://localhost:8080/health || exit 1