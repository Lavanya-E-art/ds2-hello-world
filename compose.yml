services:
  web:
    build: .
    container_name: ds2-hello
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); })"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s